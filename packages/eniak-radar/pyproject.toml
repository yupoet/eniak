[project]
name = "eniak-radar"
version = "0.0.1"
description = "ENIAK radar — source monitoring (arXiv, Semantic Scholar, OpenAlex, web)"
requires-python = ">=3.11"
dependencies = [
    "eniak-evidence",
    "httpx>=0.28.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eniak_radar"]
