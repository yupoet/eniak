[project]
name = "eniak-orchestrator"
version = "0.0.1"
description = "ENIAK workflow runtime — small explicit state machine for Phase 2, LangGraph candidate for Phase 3+"
requires-python = ">=3.11"
dependencies = [
    "eniak-evidence",
    "eniak-radar",
    "eniak-writer",
    "litellm>=1.55.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eniak_orchestrator"]
