[project]
name = "eniak-writer"
version = "0.0.1"
description = "ENIAK writer — outline, chapter, section, bibliography generation"
requires-python = ">=3.11"
dependencies = [
    "eniak-evidence",
    "litellm>=1.55.0",
    "pydantic>=2.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eniak_writer"]
