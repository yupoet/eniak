[project]
name = "eniak-evidence"
version = "0.0.1"
description = "ENIAK evidence domain core — Source, Document, EvidenceCard, Claim, Run, PromptTemplate, ReviewState, CostLedger"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.36",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "uuid-utils>=0.10.0",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.30.0", "psycopg[binary]>=3.2.0"]
sqlite = ["aiosqlite>=0.20.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eniak_evidence"]
